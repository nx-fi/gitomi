name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  ZIG_VERSION: "0.15.2"
  GH_REPO: ${{ github.repository }}

jobs:
  validate-release-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require protected signed tag
        env:
          GH_TOKEN: ${{ github.token }}
          REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            echo "::error::Release workflow must be triggered by a tag."
            exit 1
          fi

          if [[ "$REF_PROTECTED" != "true" ]]; then
            echo "::error::Release tags must be protected. Configure a GitHub repository ruleset for refs/tags/v* that restricts tag creation, updates, and deletion to trusted releasers."
            exit 1
          fi

          IFS=$'\t' read -r object_type object_sha < <(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}" \
              --jq '[.object.type, .object.sha] | @tsv'
          )

          if [[ "$object_type" != "tag" ]]; then
            echo "::error::Release tag must be an annotated signed tag; ${GITHUB_REF_NAME} points directly to a ${object_type}."
            exit 1
          fi

          IFS=$'\t' read -r verified reason < <(
            gh api "repos/${GITHUB_REPOSITORY}/git/tags/${object_sha}" \
              --jq '[.verification.verified, .verification.reason] | @tsv'
          )

          if [[ "$verified" != "true" ]]; then
            echo "::error::Release tag signature is not verified by GitHub: ${reason}."
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: validate-release-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-musl
            bin_ext: ""
            archive_ext: tar.gz
          - target: aarch64-linux-musl
            bin_ext: ""
            archive_ext: tar.gz
          - target: x86_64-macos
            bin_ext: ""
            archive_ext: tar.gz
          - target: aarch64-macos
            bin_ext: ""
            archive_ext: tar.gz
          - target: x86_64-windows-gnu
            bin_ext: ".exe"
            archive_ext: zip
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
          cache-key: release-${{ matrix.target }}

      - name: Build ReleaseSafe binary
        working-directory: cli
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Package artifact
        id: package
        env:
          TARGET: ${{ matrix.target }}
          BIN_EXT: ${{ matrix.bin_ext }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail
          safe_ref_name="${GITHUB_REF_NAME//\//-}"
          archive_base="gitomi-${safe_ref_name}-${TARGET}"
          staging="dist/${archive_base}"
          binary="cli/zig-out/bin/gt${BIN_EXT}"

          mkdir -p "$staging"
          cp "$binary" "$staging/"
          cp README.md LICENSE "$staging/"
          if [[ "$BIN_EXT" != ".exe" ]]; then
            chmod 755 "$staging/gt"
          fi

          if [[ "$ARCHIVE_EXT" == "zip" ]]; then
            (cd dist && zip -r "${archive_base}.zip" "${archive_base}")
            artifact="dist/${archive_base}.zip"
          else
            artifact="dist/${archive_base}.tar.gz"
            tar -czf "$artifact" -C dist "${archive_base}"
          fi

          checksum="${artifact}.sha256"
          (cd "$(dirname "$artifact")" && sha256sum "$(basename "$artifact")") > "$checksum"
          {
            echo "artifact=$artifact"
            echo "checksum=$checksum"
          } >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-assets-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --draft \
              --verify-tag \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/*)
          if (( ${#assets[@]} == 0 )); then
            echo "::error::No release assets were downloaded."
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" --jq .id)"
          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -F draft=false
