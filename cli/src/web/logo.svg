<svg
  xmlns="http://www.w3.org/2000/svg"
  width="510"
  height="360"
  viewBox="0 0 510 360"
  fill="none"
  role="img"
  aria-labelledby="gitomiIconTitle"
>
  <title id="gitomiIconTitle">Gitomi icon</title>

  <defs>
    <mask id="gitomi-iris-mask" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="510" height="360" fill="black" />

      <!-- Visible iris area -->
      <circle cx="255" cy="180" r="82" fill="white" />

      <!-- Git branch negative cutout -->
      <g
        fill="none"
        stroke="black"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M247 134 L247 226" />
        <path d="M247 193 L300 158" />
      </g>

      <!-- Top hollow node -->
      <circle cx="247" cy="134" r="20" fill="black" />
      <circle cx="247" cy="134" r="10" fill="white" />

      <!-- Bottom hollow node -->
      <circle cx="247" cy="226" r="20" fill="black" />
      <circle cx="247" cy="226" r="10" fill="white" />

      <!-- Upper-right filled node -->
      <circle cx="300" cy="158" r="20" fill="black" />
    </mask>
  </defs>

  <!-- Eye outline -->
  <path
    d="M70 180 C125 120 190 82 255 82 C320 82 385 120 440 180 C385 240 320 278 255 278 C190 278 125 240 70 180 Z"
    stroke="#10B8AA"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Iris -->
  <circle
    cx="255"
    cy="180"
    r="82"
    fill="#10B8AA"
    mask="url(#gitomi-iris-mask)"
  />
</svg>
